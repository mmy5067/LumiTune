name: Windows Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --bundles nsis,msi
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: lumitune-[platform]-[arch]-[bundle]

  draft-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --bundles nsis,msi
          tagName: ${{ github.ref_name }}
          releaseName: LumiTune ${{ github.ref_name }}
          releaseBody: |
            First public Windows preview of LumiTune.

            Highlights:
            - Apple Music Web desktop wrapper
            - Floating mini player
            - Tray playback controls
            - Now playing metadata and artwork

            See CHANGELOG.md and README.md for the current feature scope.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: lumitune-[platform]-[arch]-[bundle]
