name: Windows Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: windows-2025
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows installers
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --bundles nsis,msi

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumitune-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  draft-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --bundles nsis,msi
          tagName: ${{ github.ref_name }}
          releaseName: LumiTune ${{ github.ref_name }}
          releaseBody: |
            First public Windows preview of LumiTune.

            Highlights:
            - Apple Music Web desktop wrapper
            - Floating mini player
            - Tray playback controls
            - Now playing metadata and artwork

            See CHANGELOG.md and README.md for the current feature scope.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
